<!-- include A-Frame obviously -->
<script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>

<script src="https://rawgit.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
<!-- include ar.js for A-Frame -->
<script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs='debugUIEnabled:false;sourceType: webcam;'>
    <!-- create your content here. just a box for now -->
    <!--<a-box color = '#FEFEFF'depth='2' height='2' width='2' material='opacity: 0.8;'></a-box>-->
    <a-assets timeout='10000'>

	<a-asset-item id="temizusya" src='https://hikruschips.github.io/azumi/temizusya_less2.gltf'></a-asset-item>
	

</a-assets>
<!-- use your gltf model -->

<a-marker preset='custom'type ='pattern' url='https://hikruschips.github.io/arjs_res/temizusya.patt'>
<a-entity scale="0.2 0.2 0.2" rotation='0 45 0'gltf-model="#temizusya"></a-entity>

</a-marker>
    <!-- define a camera which will move according to the marker position -->
    
    <a-entity camera></a-entity>


  </a-scene>
</body>
