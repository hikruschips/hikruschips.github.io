<!-- include A-Frame obviously -->
<script src="https://aframe.io/releases/0.6.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-pointcloud-component/dist/aframe-pointcloud-component.min.js"></script>

<!-- include ar.js for A-Frame -->
<script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs='debugUIEnabled:false;sourceType: webcam;'>
    <!-- create your content here. just a box for now -->
    <!--<a-box color = '#FEFEFF'depth='2' height='2' width='2' material='opacity: 0.8;'></a-box>-->
	
<!-- use your gltf model -->

<a-marker preset='custom'type ='pattern' url='https://hikruschips.github.io/arjs_res/temizusya.patt'>
<a-pointcloud 
        scale="0.2 0.2 0.2" 
        position="0 0 0" 
        rotation='270 180 0'
        src="url(temizusya_less2.ply)" 
        size="0.01"
        depthWrite="false">
</a-pointcloud>
</a-marker>
    <!-- define a camera which will move according to the marker position -->
    
    <a-entity camera></a-entity>


  </a-scene>
</body>
