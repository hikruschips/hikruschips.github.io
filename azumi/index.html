<!-- include A-Frame obviously -->
<script src="https://aframe.io/releases/0.7.1/aframe.min.js"></script>

<script src="https://rawgit.com/donmccurdy/aframe-extras/master/dist/aframe-extras.loaders.min.js"></script>
<!-- include ar.js for A-Frame -->
<script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs='sourceType: webcam;'>
    <!-- create your content here. just a box for now -->
    <!--<a-box color = '#FEFEFF'depth='2' height='2' width='2' material='opacity: 0.8;'></a-box>-->
    <a-assets timeout='30000'>
	<a-asset-item id="temizusya" src='https://hikruschips.github.io/azumi/temizusya.ply'></a-asset-item>
</a-assets>
<!-- use your gltf model -->
<a-entity scale="0.1 0.1 0.1" ply-model="#temizusya"></a-entity>
    <!-- define a camera which will move according to the marker position -->
    <a-marker-camera preset='custom' url='temizusya.patt'></a-marker-camera>
  </a-scene>
</body>
